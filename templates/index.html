<div class="modal-overlay" id="quality-modal">
    <div class="modal-content">
        <h3 style="font-size: 22px; font-weight: 700;">Select Resolution 🎥</h3>
        <p style="font-size: 13px; color: var(--text-muted);">Choose your preferred quality</p>
        
        <div class="quality-options" style="grid-template-columns: 1fr 1fr 1fr;">
            <div class="q-option" onclick="selectQuality('4k', this)">4K 🔥</div>
            <div class="q-option selected" onclick="selectQuality('1080', this)">1080p</div>
            <div class="q-option" onclick="selectQuality('720', this)">720p</div>
            <div class="q-option" onclick="selectQuality('480', this)">480p</div>
            <div class="q-option" onclick="selectQuality('240', this)">240p</div>
            <div class="q-option" onclick="selectQuality('audio', this)">Audio</div>
        </div>

        <button class="btn btn-primary" onclick="startBulkDownload()">Start Download</button>
        <button class="btn" style="width: 100%; margin-top: 10px; background: #EEE;" onclick="closeModal('quality-modal')">Cancel</button>
    </div>
</div>
